<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthcare Marketing Post</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #f0f4f8; /* Soft light blue/grey for the preview background */
    font-family: 'Outfit', sans-serif;
  }

  .post-container {
    width: 1080px;
    height: 1350px;
    background-color: #ffffff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 120px 100px;
  }

  /* The glowing lines effect */
  .glow-bg {
    position: absolute;
    right: 0;
    top: 0;
    width: 50%;
    height: 100%;
    background: linear-gradient(to right, transparent 0%, rgba(249, 163, 26, 0.9) 100%);
    z-index: 1;
  }

  .stripes-mask {
    position: absolute;
    right: 0;
    top: 0;
    width: 50%;
    height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 12px,
      #ffffff 12px,
      #ffffff 36px
    );
    z-index: 2;
  }

  /* Content wrapper needs higher z-index */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .main-text {
    font-family: 'Playfair Display', serif;
    font-size: 80px;
    color: #0f172a;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -1px;
    margin-top: auto;
    margin-bottom: auto;
    max-width: 950px;
  }

  .highlight {
    background-color: #f9a31a;
    color: #0f172a;
    padding: 4px 16px;
    display: inline-block;
    line-height: 1.1;
    margin: 8px 0;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .watermark {
    font-size: 42px;
    color: #0f172a;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    letter-spacing: -1px;
  }
  
  .watermark-handle {
    font-size: 28px;
    font-weight: 400;
    opacity: 0.8;
    margin-top: 4px;
    letter-spacing: 0;
  }

  /* Icons */
  .icons {
    display: flex;
    gap: 32px;
    padding-bottom: 8px;
  }

  .icon {
    width: 56px;
    height: 56px;
  }
</style>
</head>
<body>

<div class="post-container">
  <!-- Background Effects -->
  <div class="glow-bg"></div>
  <div class="stripes-mask"></div>

  <!-- Content -->
  <div class="content">
    <div style="height: 100px;"></div> <!-- Space reserved for manual logo placement -->
    
    <div class="main-text">
      68% of patients never return<br>
      after a poor <br>
      <span class="highlight">Communication</span> <br>
      experience. Is your brand <br>
      making this mistake?
    </div>

    <div class="footer">
      <div class="watermark">
        DigiMabble
      </div>
      <div class="icons">
        <!-- Save Icon -->
        <svg class="icon" viewBox="0 0 24 24" fill="black" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
        </svg>
        <!-- Heart Icon -->
        <svg class="icon" viewBox="0 0 24 24" fill="#ff3b30" stroke="#ff3b30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      </div>
    </div>
  </div>
</div>

</body>
</html>
